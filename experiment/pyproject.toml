[project]
name = "experiment"
version = "0.1.0"
requires-python = "==3.12.*"
dependencies = [
    "trl-env",
    "mini-racer>=0.14.1",
    "pydantic>=2.13.3",
    "sympy",
    "peft>=0.19.1",
    "python-dotenv>=1.2.2",
    "tensorboard>=2.20.0",
]

[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"
explicit = true

[tool.uv.sources]
trl-env = { workspace = true }
torch = [
  { index = "pytorch-cu126", marker = "sys_platform == 'linux'" },
]